seed: 42
output_dir: results/enter_leave_stay_setting3

# Label setting: 1=5-class, 2=3-class event, 3=3-class occupancy (PRIMARY)
label_setting: 3

model:
  pretrained_name: "paris-noah/MantisV2"
  layers: [0, 1, 2, 3, 4, 5]
  output_token: "combined"
  device: "cuda"

data:
  sensor_csv: "/group-volume/ts-dataset/AIHub/enter_leave/merged_processed_data_with_motion_count_0209_0223_interval1.csv"
  events_csv: "/group-volume/ts-dataset/AIHub/enter_leave/occupancy_events_0210_0219_processed_cleaned_class5.csv"
  column_names_csv: "/group-volume/ts-dataset/AIHub/enter_leave/merged_data_with_motion_count_0209_0223.csv"
  nan_threshold: 0.3
  channels:
    - d620900d_motionSensor
    - f2e891c6_powerMeter
    - d620900d_temperatureMeasurement
    - ccea734e_temperatureMeasurement
    - 408981c2_contactSensor
    - f2e891c6_energyMeter

dataset:
  context_mode: bidirectional
  context_before: 4
  context_after: 4
  # Effective: 4+1+4 = 9 timesteps -> auto-interpolated to 64 for MantisV2

cv:
  methods: [loocv]
  primary_method: loocv

# Track 1: sklearn zero-shot classifiers
sklearn_classifiers:
  - random_forest
  - svm
  - logistic_regression
  - extra_trees
  - gradient_boosting
  - nearest_centroid

# Track 2: neural fine-tuning
neural:
  enabled: true
  heads: [linear, mlp]
  epochs: 50
  lr: 0.001
  weight_decay: 0.01
  dropout: 0.5
  hidden_dims: [128, 64]
