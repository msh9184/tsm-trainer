# Phase 1 Comprehensive Sweep: MantisV2 Frozen Embeddings + sklearn Classifiers
#
# Redesigned after initial round findings:
#   - Context window is THE dominant factor (AUC: 0.56@1min → 0.84@241min)
#   - Layer choice is negligible (±0.01 AUC across L0-L5)
#   - MantisV2 only supports output_token="combined" (cls/mean fail)
#
# CRITICAL FIX v2: Uses separate train/test sensor + event files.
#   v1 had split_date="2026-02-15" creating ~50:50 split.
#   v2 uses pre-split sensor CSVs (at midnight Feb 17) + separate event CSVs,
#   ensuring physical train/test separation with no data leakage at sensor level.
#   Train/test event ratio: ~79.5:20.5 (62:16 events).
#   Sensor split: 10119:9072 rows (52.73:47.27), exactly 5x proportional to 5-min.
#
# 3 parallel sweep groups (A/B/C) for optimal configuration search.
#
# Usage:
#   cd examples/classification/apc_occupancy
#
#   # All groups (sequential)
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --device cuda
#
#   # Single group (parallel GPU servers)
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --group A --device cuda
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --group B --device cuda
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --group C --device cuda

seed: 42
output_dir: results/phase1_sweep

# --- Model ---
model:
  pretrained_name: "paris-noah/MantisV2"

# --- Data (physically separated train/test) ---
# Pre-split 1-min sensor CSVs at midnight Feb 17 + curated event CSVs.
# Binary: count >= 1 = Occupied, count = 0 = Empty.
# Train sensor: Feb 9 23:22 ~ Feb 16 23:59 (10119 rows)
# Test sensor:  Feb 17 00:00 ~ Feb 23 07:11 (9072 rows)
# Train events: Feb 10 07:37 ~ Feb 16 07:10 (62 events, ~79.5%)
# Test events:  Feb 17 14:19 ~ Feb 19 10:16 (16 events, ~20.5%)
data:
  train_sensor_csv: "/group-volume/ts-dataset/AIHub/enter_leave/merged_processed_data_with_motion_count_0209_0223_interval1_train.csv"
  test_sensor_csv: "/group-volume/ts-dataset/AIHub/enter_leave/merged_processed_data_with_motion_count_0209_0223_interval1_test.csv"
  train_label_csv: "/group-volume/ts-dataset/AIHub/enter_leave/occupancy_events_0210_0219_processed_train.csv"
  test_label_csv: "/group-volume/ts-dataset/AIHub/enter_leave/occupancy_events_0210_0219_processed_test.csv"
  label_format: "events"
  initial_occupancy: 0
  binarize: true

# --- Defaults (updated based on initial round best) ---
default_channels:
  - d620900d_motionSensor
  - 408981c2_contactSensor

# L2 was best at 241min (AUC=0.8391), used as default for Groups A & B
default_layer: 2
# Default context for groups that don't sweep context
default_context_before: 120
default_context_after: 120
stride: 1
